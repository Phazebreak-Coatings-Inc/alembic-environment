name: alembic-migrations
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-tests:
    name: Migration tests (pytest-alembic / Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python (from .python-version)
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run migration test suite
        run: uv run python -m migrations test
