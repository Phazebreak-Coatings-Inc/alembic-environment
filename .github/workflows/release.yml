name: "Publish release to PyPI"

on:
  push:
    branches: [main]
  workflow_dispatch:    

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      new: ${{ steps.check.outputs.new }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  
      - id: ver
        run: |
          V=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Project version: $V"
      - id: check
        run: |
          if git rev-parse -q --verify "refs/tags/v${{ steps.ver.outputs.version }}" >/dev/null; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} exists: nothing to release."
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: detect
    if: needs.detect.outputs.new == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write  
      contents: write   
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - run: uv python install 3.14
      - run: uv build
      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
      - name: Smoke test (sdist)
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py
      - name: Publish
        run: uv publish
      - name: Tag + GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ needs.detect.outputs.version }}
        run: gh release create "v$V" dist/* --target "$GITHUB_SHA" --title "v$V" --generate-notes
