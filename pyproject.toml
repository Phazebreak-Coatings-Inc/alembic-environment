[project]
name = "alembic-environment"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.18.4",
    "copier>=9.15.1",
    "sqlalchemy>=2.0.50",
    "sqlmodel>=0.0.38",
    "typer>=0.26.6",
    "models",
    "migrations",
    "pytest-alembic>=0.12.1",
    "pytest>=9.0.3",
]

# This is a "virtual" workspace root: it has no [build-system], so uv treats it
# as an umbrella that is not itself built/installed. Its only job is to aggregate
# the members below into one lockfile and one virtual environment.
[tool.uv.workspace]
members = ["models", "migrations"]

[tool.uv.sources]
models = { workspace = true }
migrations = { workspace = true }
